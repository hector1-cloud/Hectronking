name: Construir Hectron APK (Reliable)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.x'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet[all]

      - name: Build APK
        run: flet build apk --release --verbose
        env:
          FLET_CLI_NO_RICH_OUTPUT: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hectron-APK
          path: build/apk/*.apk
          retention-days: 30